  <circle cx="40" cy="113" r="6" fill="#A87444"/>
  <circle cx="60" cy="113" r="6" fill="#A87444"/>
  <circle cx="80" cy="113" r="6" fill="#A87444"/>
  <line x1="0" y1="140" x2="120" y2="140" stroke="#2E4A7F" stroke-width="5" stroke-linecap="square"/>
</svg>
